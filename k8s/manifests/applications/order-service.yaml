apiVersion: v1
kind: Secret
metadata:
  name: order-service-secret
stringData:
  SPRING_DATASOURCE_PASSWORD: "1234"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: order-service-config
data:
  SERVER_PORT: "8081"
  SPRING_APPLICATION_NAME: "order-service"
  SPRING_DATASOURCE_URL: "jdbc:mysql://mysql-order.default.svc.cluster.local:3306/manu-orderdb-ms"
  SPRING_DATASOURCE_USERNAME: "manu"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka-broker.default.svc.cluster.local:29092"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,metrics,prometheus"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: order-service:0.0.1-SNAPSHOT
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: order-service-config
          env:
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: order-service-secret
                  key: SPRING_DATASOURCE_PASSWORD

---
apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
  selector:
    app: order-service
