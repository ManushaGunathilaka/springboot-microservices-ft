apiVersion: v1
kind: Secret
metadata:
  name: inventory-service-secret
stringData:
  SPRING_DATASOURCE_PASSWORD: "1234"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: inventory-service-config
data:
  SERVER_PORT: "8082"
  SPRING_APPLICATION_NAME: "inventory-service"
  SPRING_DATASOURCE_URL: "jdbc:mysql://mysql-inventory.default.svc.cluster.local:3306/manu-inventoryrdb-ms"
  SPRING_DATASOURCE_USERNAME: "root"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,metrics,prometheus"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: inventory-service:0.0.1-SNAPSHOT
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: inventory-service-config
          env:
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: inventory-service-secret
                  key: SPRING_DATASOURCE_PASSWORD

---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
spec:
  type: ClusterIP
  ports:
    - port: 8082
      targetPort: 8082
      protocol: TCP
  selector:
    app: inventory-service
